version: 2

sources:
  - name: profit_scout
    database: profitscout-fida8
    schema: profit_scout
    description: >
      Raw production tables written by the GammaRips Python Cloud Run pipeline.
      dbt reads these read-only; it never writes back here.

    tables:
      - name: forward_paper_ledger
        description: >
          Terminal paper-trade records (3-day hold era + current). One row per
          signal after the hold closes — trade rows and skip rows
          (`is_skipped=true`). `realized_return_pct` is the OPTION premium return,
          the canonical PnL for this project (never the underlying).
        config:
          loaded_at_field: "CAST(exit_timestamp AS TIMESTAMP)"
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 120, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: [scan_date, ticker, recommended_contract]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: ticker
            tests: [not_null]

      - name: forward_paper_ledger_intraday
        description: >
          Intraday end-of-day mark-to-market snapshots of open positions
          (V7 GIGO). One row per open position per trading day.
          `unrealized_return_pct` is the live option PnL of the open position.
        config:
          loaded_at_field: "CAST(snapshot_ts AS TIMESTAMP)"
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 120, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: [scan_date, snapshot_date, ticker]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: snapshot_date
            tests: [not_null]

      - name: overnight_signals_enriched
        description: >
          Enriched + scored signal pool (the tournament candidate set). Scanner
          fields carried over plus technicals, news, risk, and premium scoring.
        config:
          loaded_at_field: enriched_at
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 120, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: [scan_date, ticker]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: ticker
            tests: [not_null]

      - name: overnight_signals
        description: >
          Raw overnight scan output (pre-enrichment). One row per scored ticker
          per scan date.
        config:
          loaded_at_field: scan_timestamp
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 120, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: [scan_date, ticker]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: ticker
            tests: [not_null]

      # ---- Outcomes / research domain (Phase 2) ----

      - name: enriched_option_outcomes
        description: >
          Counterfactual bracket-replay option-PnL labels over the FULL enriched
          pool (every candidate we *could* have traded), so a leakage-safe label
          set accrues ~50x faster than the 1-pick/day ledger. Partitioned by
          entry_day, clustered by ticker. `realized_return_pct` is the option PnL.
          NOTE: known data-quality issues (≈145 duplicate rows, uneven daily
          counts pre-Jun11) — the uniqueness test below is WARN, not error.
        config:
          loaded_at_field: labeled_at
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 120, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              config:
                severity: warn
              arguments:
                combination_of_columns: [scan_date, ticker, recommended_contract]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: entry_day
            tests: [not_null]
          - name: ticker
            tests: [not_null]

      - name: signal_performance
        description: >
          Post-trade underlying-outcome tracking (win-tracker). Underlying-price
          based, NOT option PnL — kept for context only. Has historical column
          drift across writer eras; staging is intentionally lossless `select *`.
        config:
          loaded_at_field: performance_updated
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              config:
                severity: warn
              arguments:
                combination_of_columns: [scan_date, ticker]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: ticker
            tests: [not_null]

      - name: paper_shadow_topscore
        description: >
          Isolated research shadow: Tournament pick vs deterministic top-score
          pick (one row per arm per day; arm in {TOURNAMENT, TOP_SCORE}).
          Walled off from Scorecard/website.
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              config:
                severity: warn
              arguments:
                combination_of_columns: [scan_date, arm]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: entry_day
            tests: [not_null]
          - name: arm
            tests: [not_null]

      - name: paper_shadow_intraday
        description: >
          Isolated research shadow: intraday-hold vs 3-day-hold for both the
          Tournament and top-score picks (completes the 2x2). One row per arm
          per day; arm in {TOURNAMENT, TOP_SCORE}.
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              config:
                severity: warn
              arguments:
                combination_of_columns: [scan_date, arm]
        columns:
          - name: scan_date
            tests: [not_null]
          - name: entry_day
            tests: [not_null]
          - name: arm
            tests: [not_null]

      # ---- Eval / LLM-observability domain (Phase 3) ----

      - name: llm_traces_v1
        description: >
          One row per LLM call across all instrumented services (trace logger).
          Carries tokens, cost, latency, status/error. Partitioned by scan_date,
          clustered by (service, model_id). Grain = trace_id.
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              config:
                severity: warn
              arguments:
                combination_of_columns: [trace_id]
        columns:
          - name: trace_id
            tests: [not_null]
          - name: service
            tests: [not_null]
          - name: model_id
            tests: [not_null]
          - name: scan_date
            tests: [not_null]
          - name: status
            tests: [not_null]

      - name: llm_eval_results_v1
        description: >
          One row per (trace, evaluator) eval result (gammarips-eval). Carries
          score / passed / judge_model. Partitioned by scan_date, clustered by
          (service, evaluator). Grain = eval_id.
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
        tests:
          - dbt_utils.unique_combination_of_columns:
              config:
                severity: warn
              arguments:
                combination_of_columns: [eval_id]
        columns:
          - name: eval_id
            tests: [not_null]
          - name: trace_id
            tests: [not_null]
          - name: evaluator
            tests: [not_null]
          - name: scan_date
            tests: [not_null]
