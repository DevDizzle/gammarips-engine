version: 2

models:
  - name: metricflow_time_spine
    description: Daily time spine for the dbt Semantic Layer.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
        tests: [not_null, unique]
    # date_day is the standard-granularity spine column.
